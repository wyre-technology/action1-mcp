# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - action1BaseUrl
      - action1ClientId
      - action1ClientSecret
    properties:
      action1BaseUrl:
        type: string
        description: Your Action1 instance base URL
      action1ClientId:
        type: string
        description: Your Action1 API client ID
      action1ClientSecret:
        type: string
        description: Your Action1 API client secret
      action1Tenant:
        type: string
        description: Your Action1 tenant name (if multi-tenant)
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { ACTION1_BASE_URL: config.action1BaseUrl, ACTION1_CLIENT_ID: config.action1ClientId, ACTION1_CLIENT_SECRET: config.action1ClientSecret, ACTION1_TENANT: config.action1Tenant || '', MCP_TRANSPORT: 'stdio' } })
